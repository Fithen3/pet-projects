<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValCup</title>
    <link rel="stylesheet" href="./styles/tournament.css">
    <link rel="stylesheet" href="./styles/auth.css">
    <link rel="stylesheet" href="./styles/teamregmodal.css">
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
</head>

<body>

  <!-- Logo -->
  <div class="logo">
    <a href="./index.html">
        <div class="logo-content">
            <img src="./images/valcup-logo.svg" alt="">
            <p class="domain">valcup.<span class="suffix">pro</span></p>
        </div>
    </a>
  </div>

  <!-- Card -->
  <div class="backlight">
  <div class="card">
    <h1 class="card-title">Регистрация</h1>

    <form class="form" action="#" method="post">
      <input class="input" type="text" name="username" placeholder="Почта">
      <input class="input" type="text" name="text" placeholder="Логин">
      <input class="input" type="password" name="username" placeholder="Пароль">
      <input class="input" type="password" name="username" placeholder="Повторите пароль">
      <label class="checkbox-container">
        <input type="checkbox" class="checkbox-input" required>
        <span class="checkbox-custom"></span>
        <span class="checkbox-label">Согласен с <a href="#">правилами платформы</a></span>
      </label>
      <button class="btn-primary" type="submit"><a href="./tournaments.html">Войти</a></button>
    </form>

    <div class="links">
      <a href="./auth.html">Уже зарегистрированы? Войти</a>
    </div>
  </div>
  </div>

  <!-- Footer -->
  <p class="copyright">&copy;valcup Все права защищены</p>

</body>
</html>
</html>
