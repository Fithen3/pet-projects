<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValCup</title>
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./styles/winnerchose.css">
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/profile.css">
    <link rel="stylesheet" href="./styles/closedcodemodal.css">
</head>
<body>
    <header class="header">
		<div class="content-header">
			<nav class="nav">
                <a href="./index.html" class="link link-home" title="FAQ">
                    <div class="site-brand"><img class="icon-logo1" src="./images/valcup-logo.svg" alt="ValCup logo" width="34" height="72"><p class="domain">valcup.<span class="suffix">pro</span></p></div>
                </a>
                <a class="link text-heading-s" href="./tournaments.html" title="Турниры">
                    <span class="link-content">ТУРНИРЫ</span>
                    <div class="glow"></div>
                    <div class="decoration decoration-outlined"></div></a>
                <a class="link text-heading-s" href="./faq.html" title="FAQ">
                    <span class="link-content">FAQ</span>
                    <div class="glow"></div>
                    <div class="decoration decoration-outlined"></div>
                </a>
			</nav>
			<button class="profile"><a href="./profile.html">kkwoqq</a></button>
		</div>
	</header>

    <main class="main">
        <div class="backlight">
            <section class="winner-info">
                <div class="winner-text">
                    <h1 class="text-heading-l">Команда А победила</h1>
                    <p>Поздравляем с победой в матче!</p>
                    <div class="stage"><p class="info-item2">Этап 3/3</p></div>
                </div>
                <div class="teams">
                    <div class="team">
                        <p class="team-title">Команда А</p>
                    </div>
                    <img src="./images/load.png" alt="">
                    <div class="team">
                        <p class="team-title">Команда Б</p>
                    </div>
                </div>
                
                <div class="codeform">
                    <a href="./tournamentready.html"><button class="confirm">Вернуться на страницу турнира</button></a>
                </div>
            </section>
        </div>
    </main>



<!-- Footer -->
    <footer class="footer">
            <div class="footer-container">
                <div class="brand">
                    <a href="./index.html" class="" title="">
                        <div class="site-brand"><img class="icon-logo" src="./images/valcup-logo.svg" alt="ValCup logo"><p class="domain">valcup.<span class="suffix">pro</span></p></div>
                    </a>
                    <div class="socials">
                        <img src="./images/vk.png" class="icon">
                        <img src="./images/tg.png" class="icon">
                    </div>
                    <p class="copyright text-base-m">©Valcup Все права защищены</p>
                </div>
                <div class="links">
                    <a href="./index.html" class="text-base-m">Главная</a>
                    <a href="./tournaments.html" class="text-base-m">Турниры</a>
                    <a href="./faq.html" class="text-base-m">FAQ</a>
                </div>
                <div class="support">
                    <h3 class="support-heading text-heading-s">Служба поддержки</h3>
                    <p class="support-description text-base-m">
                        Мы всегда готовы вам помочь. Наши операторы онлайн 24/7
                    </p>
                    <button id="openModalBtn" class="menu-button footer-btn">Написать в чат</button>
                </div>
            </div>
        </footer>

</body>
</html>
